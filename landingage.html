<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CleverFood</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}


header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:white;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#7bbf00;
}

nav a{
    margin:0 15px;
    text-decoration:none;
    color:#333;
}



.banner{
    background:url("https://images.unsplash.com/photo-1490818387583-1baba5e638af") center/cover;
    height:350px;
    display:flex;
    align-items:center;
    padding-left:80px;
    color:white;
}

.banner h1{
    font-size:40px;
}

.banner button{
    padding:12px 25px;
    background:#7bbf00;
    border:none;
    color:white;
    margin-top:10px;
}



.category{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    padding:40px 80px;
}

.box{
    background:white;
    padding:20px;
    text-align:center;
    border-radius:8px;
}

.box img{
    width:120px;
}



.products{
    padding:40px 80px;
}

.products h2{
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:25px;
    margin-top:30px;
}

.product{
    background:white;
    padding:20px;
    text-align:center;
    border-radius:8px;
}

.product img{
    width:120px;
}

.price{
    color:#7bbf00;
    font-weight:bold;
}

/* sale */

.sale{
    background:url("https://images.unsplash.com/photo-1478147427282-58a87a120781") center/cover;
    padding:60px;
    color:white;
    text-align:center;
}

/* footer */

footer{
    background:#222;
    color:white;
    padding:40px;
    text-align:center;
}

input{
    padding:10px;
    width:250px;
}

button.subscribe{
    padding:10px 20px;
    background:#7bbf00;
    border:none;
    color:white;
}

</style>
</head>

<body>

<header>
<div class="logo">CLEVERFOOD</div>

<nav>
<a href="#">Trang chủ</a>
<a href="#">Giới thiệu</a>
<a href="#">Cửa hàng</a>
<a href="#">Kiến thức</a>
<a href="#">Liên hệ</a>
</nav>
</header>




</body>
</html>
